name: PR Image

# Builds, pushes, and comments a preview container image for every pull request.
#
# Tags (ghcr.io/runwhen-contrib/vpa-provisioner):
#   pr-<n>         — moving pointer, updated on each push to the PR
#   pr-<n>-<sha>   — immutable commit tag for this PR revision

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: runwhen-contrib/vpa-provisioner

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 120s ./...

      - name: Helm template
        uses: azure/setup-helm@v4

      - name: Render chart
        run: |
          helm lint ./charts/vpa-provisioner
          helm template test ./charts/vpa-provisioner --namespace vpa-provisioner

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      pr_tag: ${{ steps.image.outputs.pr_tag }}
      sha_tag: ${{ steps.image.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute PR image tags
        id: image
        run: |
          pr_tag="pr-${{ github.event.pull_request.number }}"
          sha_tag="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo "pr_tag=${pr_tag}"
            echo "sha_tag=${sha_tag}"
            echo "image=${image}"
            echo "tags=${image}:${pr_tag},${image}:${sha_tag}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## PR preview image"
            echo
            echo "- \`${image}:${pr_tag}\`"
            echo "- \`${image}:${sha_tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  comment-on-pr:
    needs: build-and-push
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ needs.build-and-push.result }}' === 'success';
            const image = '${{ needs.build-and-push.outputs.image }}';
            const prTag = '${{ needs.build-and-push.outputs.pr_tag }}';
            const shaTag = '${{ needs.build-and-push.outputs.sha_tag }}';

            const body = [
              '## vpa-provisioner PR image',
              '',
              `**Build:** ${ok ? 'success' : 'failed'}`,
              '',
              '| Tag | Pull |',
              '|-----|------|',
              `| \`${prTag}\` (latest for this PR) | \`${image}:${prTag}\` |`,
              `| \`${shaTag}\` (this commit) | \`${image}:${shaTag}\` |`,
              '',
              'Helm example:',
              '```bash',
              `helm upgrade --install vpa-provisioner ./charts/vpa-provisioner \\`,
              `  --namespace vpa-provisioner --create-namespace \\`,
              `  --set image.tag=${prTag}`,
              '```',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
