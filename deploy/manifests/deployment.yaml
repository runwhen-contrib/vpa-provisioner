apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-provisioner
  namespace: vpa-provisioner
  labels:
    app.kubernetes.io/name: vpa-provisioner
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vpa-provisioner
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpa-provisioner
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: vpa-provisioner
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vpa-provisioner
          image: ghcr.io/runwhen-contrib/vpa-provisioner:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - -exclude-namespaces=kube-system,vpa-provisioner,kube-public
            - -config-map-name=vpa-provisioner-config
            - -config-map-namespace=vpa-provisioner
            - -require-recommender=true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
